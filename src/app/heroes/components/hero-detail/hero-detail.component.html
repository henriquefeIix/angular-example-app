<div *ngIf="hero">
  <h2>{{ hero.name | titlecase }} Details</h2>

  <mat-card>
    <mat-card-content fxLayout="column">
      <mat-form-field>
        <mat-label>Identifier</mat-label>
        <input matInput disabled="true" [value]="hero.id">
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Name</mat-label>
        <input matInput id="name" [(ngModel)]="hero.name" placeholder="Name">
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button (click)="goBack()">Go Back</button>
    </mat-card-actions>
  </mat-card>
</div>
