<div *ngIf="hero">
  <h2>{{ hero.name | titlecase }} Details</h2>

  <div><span style="font-weight: bold;">Identifier: </span> {{ hero.id }}</div>
  <div><span style="font-weight: bold;">Nome: </span> {{ hero.name }}</div>

  <div style="margin-bottom: 15px;">
    <label style="padding-right: 5px; font-weight: bold;">Hero Name: </label>
    <input id="name" [(ngModel)]="hero.name" placeholder="Name" type="text" />
  </div>

  <button mat-raised-button (click)="goBack()">Go Back</button>
</div>
