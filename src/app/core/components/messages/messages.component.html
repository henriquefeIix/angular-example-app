<mat-accordion *ngIf="messageService.getMessages().length">
  <mat-expansion-panel expanded="false">
    <mat-expansion-panel-header>
      <mat-panel-title>
        Messages
      </mat-panel-title>

      <mat-panel-description>
        {{messageService.getMessages().length}} record(s)
      </mat-panel-description>
    </mat-expansion-panel-header>

    <mat-list *ngFor="let message of messageService.getMessages()">
      <mat-list-item *ngFor="let message of messageService.getMessages()">
        {{ message }}
      </mat-list-item>
    </mat-list>

    <mat-action-row>
      <button mat-raised-button color="warn" (click)="messageService.clear()">Clear Messages</button>
    </mat-action-row>
  </mat-expansion-panel>
</mat-accordion>
